services:
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/auth.db
    volumes:
      - auth_data:/app/data

  image-service:
    build:
      context: ./image-service
      dockerfile: Dockerfile
    ports:
      - "8082:5000"
    volumes:
      - image_data:/root/uploads
    depends_on:
      - auth-service

volumes:
  auth_data:
  image_data: